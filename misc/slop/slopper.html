<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>big slopper</title>
    <meta
      name="description"
      content="unsafely evaluate random code that chrome slop api generates"
    />
    <meta name="theme-color" content="#4fa1a7" />

    <link rel="stylesheet" type="text/css" href="/sheep3.css" />
    <link rel="stylesheet" type="text/css" href="/reform/v1/index.css" />
    <link rel="stylesheet" type="text/css" href="./setup.css" />
    <script src="/sheep3.js" charset="utf-8"></script>
    <style>
      pre {
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <form class="main" role="main" action="javascript:" id="wrapper">
      <h1>slop</h1>
      <p>
        slop slop slop. this uses the
        <a href="https://developer.chrome.com/docs/ai/prompt-api" class="link"
          >chrome slop api</a
        >
        to unsafely evaluate arbitary LLM-generated javascript on this very web
        page
      </p>

      <div id="setup-status"></div>
    </form>

    <script type="module">
      import { on } from '/reform/v1/index.js'
      import { setup } from './setup.js'

      await setup()

      const adj = [
        'fun',
        'crazy',
        'weird',
        'normal',
        'average',
        'bland',
        'creative',
        'abstract',
        'complex',
        'simple',
        'red',
        'yellow',
        'green',
        'blue',
        'animated',
        'flashy',
        'boring',
        'unseen',
        'sparkly',
        'sprinkles',
        'spaghetti',
        'lasagna',
        'chinese',
        'multicultural',
        'particles',
        'minecraft',
        'blocky',
        // 'educational',
        'interactive',
        'turtle',
        'sheep',
        'ovine',
        'divine',
        'scientific',
        'pseudoscientific',
        'imaginary',
        'imaginative',
        'fictional',
        'emoji',
        'circle',
        'square',
        'triangle',
        'rounded',
        'fast',
        'funny',
        'interesting',
        'curious',
        'playable',
        'tactical',
        'tactile',
        'futuristic',
        'traditional',
        'classic',
        'smelly',
        'multilingual',
        'spanish',
        'french',
        'japanese',
        'cherokee',
        'toki pona',
        'esperanto',
        'cat',
        'dog',
        'shepherd',
        'lamb',
        'ram',
        'zodiac',
        'css',
        'canvas',
        'bouncy',
        'boingy',
        'springy',
        'faded',
        'shaded',
        'lit',
        'bright',
        'exciting',
        'catalan',
        'german',
        'shapes',
        'unicorn',
        'seahorse emoji',
        'trump',
        'political',
        'images',
        'graphical',
        'does something',
        'clickable',
        'draggable',
        'tappable',
        'adventure',
        'colorful',
        'rainbow',
        'pride',
        'multicolor',
        'black and white',
        'comic sans',
        'alert()',
        'prompt()'
      ]

      on('wrapper', async wrapper => {
        while (true) {
          console.log('creating session...')
          const words = [
            adj[Math.floor(Math.random() * adj.length)],
            adj[Math.floor(Math.random() * adj.length)],
            adj[Math.floor(Math.random() * adj.length)]
          ].join(', ')
          wrapper.append(
            Object.assign(document.createElement('h2'), {
              textContent: words
            })
          )
          const systemPrompt = [
            `write ONLY javascript (no explanation) that document.body.insertAdjacentHTML() ${words} element(s) to the web page!`,
            'it will be run with JSON.stringify(await eval(yourCode))',
            'so no top level await/return.',
            "you will thus get the last statement's return value or an error."
            // 'to preserve tokens, code golf/minify your code (single line, single-letter variables).'
          ].join(' ')
          console.log('[system]', systemPrompt)
          const session = await LanguageModel.create({
            initialPrompts: [
              {
                role: 'system',
                content: systemPrompt
              }
            ]
          })
          console.log(`${session.contextUsage}/${session.contextWindow}`)
          let result
          let attempts = 0
          while (true) {
            const pre = document.createElement('pre')
            wrapper.append(pre)
            let javascript = ''
            pre.textContent = javascript
            for await (const chunk of session.promptStreaming([
              ...(result ? [{ role: 'user', content: `${result}` }] : []),
              { role: 'assistant', content: '```js\n', prefix: true }
            ])) {
              javascript += chunk
              pre.textContent = javascript
            }
            console.log(javascript)
            console.log(`${session.contextUsage}/${session.contextWindow}`)
            const stripped = javascript
              .replace(/^```js/, '')
              .split('```')[0]
              .replaceAll('document.body.', 'wrapper.')
            pre.textContent = stripped
            if (!stripped.trim()) {
              pre.remove()
              wrapper.append(
                Object.assign(document.createElement('p'), {
                  textContent: 'clanker is satisfied. again!'
                })
              )
              break
            }
            let success = false
            if (stripped.includes('body.innerHTML')) {
              result = 'do not use innerHTML'
            } else if (stripped.includes('<script>')) {
              result =
                'script tag shouldnt be necessary, you can just run javascript after inserting your html'
            } else {
              try {
                result = await eval(stripped)
                result =
                  result === undefined ? undefined : JSON.stringify(result)
                success = true
              } catch (error) {
                result = error.stack
              }
            }
            if (result !== undefined) {
              wrapper.append(
                Object.assign(document.createElement('pre'), {
                  textContent: result
                })
              )
            }
            if (success) {
              result +=
                '\nif this result seems correct to you, output a blank code block and do not repeat the code again.'
            }
            console.log('[result]', result)
            attempts++
            if (attempts >= 3) {
              wrapper.append(
                Object.assign(document.createElement('p'), {
                  textContent: 'dumbass clanker, lets try a new thing'
                })
              )
              break
            }
          }
        }
      })
    </script>
  </body>
</html>
