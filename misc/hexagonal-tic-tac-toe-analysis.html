<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Hexagonal tic-tac-toe analysis</title>
    <meta
      name="description"
      content="Hexagonal tic-tac-toe with board markings for threats and preemptives"
    />

    <link rel="stylesheet" type="text/css" href="/sheep3.css" />
    <script src="/sheep3.js" charset="utf-8"></script>

    <style>
      html,
      body {
        height: 100%;
      }
      body {
        display: flex;
        margin: 0;
        font-family: system-ui;
      }
      canvas {
        width: 100%;
        height: 100%;
        touch-action: none;
        user-select: none;
      }
      .note {
        position: fixed;
        top: 0;
        left: 0;
        margin: 20px;
        padding: 20px;
        gap: 10px;
        border-radius: 15px;
        background-color: rgba(255, 255, 255, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.3);
        backdrop-filter: blur(5px);
        width: 250px;
        display: flex;
        flex-direction: column;
      }
      p,
      ol {
        margin: 0;
      }
      ol ::marker {
        color: color-mix(in srgb, currentColor 30%, transparent);
      }
      a {
        color: #3b82f6;
        text-decoration-color: color-mix(
          in srgb,
          currentColor 30%,
          transparent
        );
        font-weight: bold;

        &:hover {
          text-decoration-color: currentColor;
        }
      }
    </style>
  </head>
  <body>
    <div class="note">
      <p>
        Highlights threats and preemptives in
        <a href="https://www.youtube.com/watch?v=EzLzkcRZurk"
          >hexagonal tic-tac-toe</a
        >:
      </p>
      <ol>
        <li>Infinite hex grid</li>
        <li>6 in a row to win</li>
        <li>
          Play order:
          &times;&compfn;&compfn;&times;&times;&compfn;&compfn;&times;&times;⋯
        </li>
      </ol>
    </div>
    <canvas id="canvas"></canvas>
    <script type="module">
      import { Vector2 } from 'https://sheeptester.github.io/javascripts/Vector2.js'

      // math figured out in github.com/Subset-UCSD/Commit-Challenge-2026/blob/main/enclose-hexse.html
      const HEX_RADIUS = 30
      const offsetX = HEX_RADIUS * Math.sqrt(3)
      const offsetY = HEX_RADIUS * 1.5
      const hexToPx = ({ x, y }) =>
        new Vector2((x - y / 2) * offsetX, y * offsetY)
      const pxToHex = v => {
        const y = v.y / offsetY
        return new Vector2(v.x / offsetX + y / 2, y)
      }
      const nearestHex = mouse => {
        let closest
        let dist = Infinity
        const guess = pxToHex(mouse)
        for (let x = Math.floor(guess.x); x <= Math.ceil(guess.x); x++) {
          for (let y = Math.floor(guess.y); y <= Math.ceil(guess.y); y++) {
            const d = hexToPx({ x, y }).sub(mouse).lengthSquared
            if (d < dist) {
              dist = d
              closest = new Vector2(x, y)
            }
          }
        }
        return closest
      }
      const neighborPairs = [
        [new Vector2(0, -1), new Vector2(0, 1)],
        [new Vector2(-1, 0), new Vector2(1, 0)],
        [new Vector2(-1, -1), new Vector2(1, 1)]
      ]

      /** @type {HTMLCanvasElement} */
      const canvas = document.getElementById('canvas')
      const c = canvas.getContext('2d', { alpha: false })
      let size = new Vector2()
      let dpr = 1

      const resize = () => {
        size = new Vector2(window.innerWidth, window.innerHeight)
        dpr = window.devicePixelRatio
        canvas.width = size.x * dpr
        canvas.height = size.y * dpr
        paint()
      }
      window.addEventListener('resize', resize)

      const view = { translate: new Vector2(), scale: 1 }
      const transform = v => v.scale(view.scale).add(view.translate)
      const untransform = v => v.sub(view.translate).scale(1 / view.scale)
      let mouse
      let dragState
      canvas.addEventListener('pointerdown', e => {
        if (!dragState) {
          dragState = {
            pointerId: e.pointerId,
            initPtr: Vector2.fromMouseEvent(e),
            initTranslate: view.translate,
            dragging: false
          }
          canvas.setPointerCapture(e.pointerId)
        }
      })
      canvas.addEventListener('pointermove', e => {
        let change = false
        if (dragState?.pointerId === e.pointerId) {
          if (!dragState.dragging) {
            if (
              Vector2.fromMouseEvent(e).sub(dragState.initPtr).lengthSquared > 5
            ) {
              dragState.dragging = true
            }
          }
          if (dragState.dragging) {
            view.translate = Vector2.fromMouseEvent(e)
              .sub(dragState.initPtr)
              .add(dragState.initTranslate)
            change = true
          }
        }
        if (e.pointerType === 'mouse') {
          mouse = Vector2.fromMouseEvent(e)
          change = true
        }
        if (change) {
          paint()
        }
      })
      const handlePointerEnd = e => {
        if (dragState?.pointerId === e.pointerId) {
          if (!dragState.dragging) {
            click(nearestHex(untransform(dragState.initPtr)))
          }
          dragState = null
        }
      }
      canvas.addEventListener('pointerup', handlePointerEnd)
      canvas.addEventListener('pointercancel', handlePointerEnd)
      canvas.addEventListener('pointerleave', () => {
        if (mouse) {
          mouse = null
          paint()
        }
      })
      canvas.addEventListener(
        'wheel',
        e => {
          if (e.shiftKey || e.ctrlKey || e.altKey || e.metaKey) {
            return
          }
          e.preventDefault()
          const oldScale = view.scale
          view.scale *= Math.exp(Math.min(Math.max(-e.deltaY / 600, -2), 2))
          view.scale = Math.max(Math.min(view.scale, 20), 0.2)
          view.translate.add(
            view.translate
              .clone()
              .sub(Vector2.fromMouseEvent(e))
              .scale((view.scale - oldScale) / oldScale)
          )
          paint()
        },
        { passive: false }
      )

      const board = new Map()
      const get = ({ x, y }, b = board) => b.get(x)?.get(y)
      const set = ({ x, y }, value, b = board) =>
        b.getOrInsertComputed(x, () => new Map()).set(y, value)
      let turn = 0
      const getNext = () => (Math.floor((turn + 1) / 2) % 2 === 0 ? 'x' : 'o')
      const click = hex => {
        if (get(hex)) {
          return
        }
        set(hex, getNext())
        turn++
        renderCache = new Map()
        paint()
      }
      let renderCache = new Map()

      const hexPath = (hex, alt) => {
        for (let i = 1; i < 7; i++) {
          c[(alt ? !(i % 2) : i > 1) ? 'lineTo' : 'moveTo'](
            ...new Vector2(HEX_RADIUS)
              .rotate((i + 0.5) * (Math.PI / 3))
              .add(hexToPx(hex))
          )
        }
        c.closePath()
      }
      const getStatus = hex => {
        const status = {
          o: { win: false, threat: false, preemptive: false },
          x: { win: false, threat: false, preemptive: false }
        }
        for (const [dir] of neighborPairs) {
          let cum = { count: 0, total: 0, last: null, queue: [] }
          for (let i = -5; i < 6; i++) {
            const dirCell = get(dir.clone().scale(i).add(hex))
            if (dirCell) {
              if (!cum.last) {
                cum.last = dirCell
              } else if (dirCell !== cum.last) {
                cum = { count: 0, total: 0, last: dirCell, queue: [] }
              }
              cum.count++
              cum.queue.push(1)
            } else {
              cum.queue.push(0)
            }
            if (cum.total < 6) {
              cum.total++
            } else {
              // cut off the left end of the 6-cell range
              cum.count -= cum.queue.shift()
            }
            if (cum.total > 6) {
              throw new Error('range too long')
            }
            if (cum.queue.length > 6) {
              throw new Error('queue too long')
            }
            if (cum.total === 6 && cum.count >= 2) {
              status[cum.last][
                cum.count >= 6
                  ? 'win'
                  : cum.count >= 4
                    ? 'threat'
                    : 'preemptive'
              ] = true
            }
          }
        }
        return status
      }
      const paint = () => {
        c.fillStyle = '#eee'
        c.fillRect(0, 0, canvas.width, canvas.height)
        c.save()
        c.scale(dpr, dpr)
        c.translate(...view.translate)
        c.scale(view.scale, view.scale)

        c.lineCap = 'round'

        const hexes = []
        const min = pxToHex(untransform(new Vector2()))
        const max = pxToHex(untransform(size.clone()))
        for (let x = Math.floor(min.x); x <= Math.ceil(max.x); x++) {
          for (let y = Math.floor(min.y); y <= Math.ceil(max.y); y++) {
            const position = hexToPx({ x, y })
            if (
              position.bounded({ min: -HEX_RADIUS }) &&
              position.clone().sub(size).bounded({ max: HEX_RADIUS })
            ) {
              hexes.push(new Vector2(x, y))
            }
          }
        }

        const hovered = mouse && nearestHex(untransform(mouse.clone()))
        c.lineWidth = 5
        for (const hex of hexes) {
          const cell = get(hex)
          const status = renderCache
            .getOrInsertComputed(hex.x, () => new Map())
            .getOrInsertComputed(hex.y, () => getStatus(hex))
          const fill = status.o.win
            ? status.x.win
              ? 'black'
              : '#3b82f6'
            : status.x.win
              ? '#f43f5e'
              : status.o.threat
                ? status.x.threat
                  ? getNext() === 'x'
                    ? '#f43f5e33'
                    : '#3b82f633'
                  : '#3b82f633'
                : status.x.threat
                  ? '#f43f5e33'
                  : status.o.preemptive
                    ? status.x.preemptive
                      ? '#a855f711'
                      : '#3b82f611'
                    : status.x.preemptive
                      ? '#f43f5e11'
                      : null
          if (fill) {
            c.fillStyle = fill
            c.beginPath()
            hexPath(hex)
            c.fill()
          }
          if (hovered?.equals(hex)) {
            c.fillStyle = 'rgba(0, 0, 0, 0.03)'
            c.beginPath()
            hexPath(hex)
            c.fill()
          }
          const px = hexToPx(hex)
          const displayShape = cell ?? (hovered?.equals(hex) ? getNext() : null)
          switch (displayShape) {
            case 'o': {
              c.strokeStyle =
                status.o.win || status.x.win
                  ? 'white'
                  : cell
                    ? '#3b82f6'
                    : 'rgba(0, 0, 0, 0.1)'
              c.beginPath()
              const radius = HEX_RADIUS * 0.4
              c.moveTo(...new Vector2(radius).add(px))
              c.arc(...px, radius, 0, 2 * Math.PI)
              c.stroke()
              break
            }
            case 'x': {
              c.strokeStyle =
                status.o.win || status.x.win
                  ? 'white'
                  : cell
                    ? '#f43f5e'
                    : 'rgba(0, 0, 0, 0.1)'
              c.beginPath()
              const radius = HEX_RADIUS * 0.5
              for (let i = 0; i < 2; i++) {
                c.moveTo(
                  ...new Vector2(radius)
                    .rotate(Math.PI * (i * 0.5 + 0.25))
                    .add(px)
                )
                c.lineTo(
                  ...new Vector2(radius)
                    .rotate(Math.PI * (i * 0.5 + 1.25))
                    .add(px)
                )
              }
              c.stroke()
              break
            }
          }
        }

        c.strokeStyle = 'rgba(0, 0, 0, 0.1)'
        c.lineWidth = 1
        c.beginPath()
        for (const hex of hexes) {
          const mod = (hex.x + hex.y) % 3
          if (mod === 0) {
            hexPath(hex)
          } else if (mod === 1 || mod === -2) {
            hexPath(hex, true)
          }
        }
        c.stroke()

        c.restore()
      }

      resize()
    </script>
  </body>
</html>
