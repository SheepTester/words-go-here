<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Diff</title>
    <meta
      name="description"
      content="Shows the differences between two pieces of text using Monaco (VS Code)'s diff editor"
    />
    <meta
      property="og:image"
      content="https://sheeptester.github.io/img/diff.webp"
    />

    <link rel="stylesheet" type="text/css" href="/sheep3.css" />
    <script src="/sheep3.js" charset="utf-8"></script>

    <style>
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        font-family: system-ui, sans-serif;
        background-color: var(--vscode-editor-background);
      }
      #container {
        flex: auto;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
        }
      }
      .monaco-editor {
        --vscode-focusBorder: transparent !important;
      }
    </style>
  </head>
  <body class="monaco-component">
    <div id="container"></div>
    <script src="https://unpkg.com/monaco-editor@0.52.2/min/vs/loader.js"></script>
    <script>
      // https://stackoverflow.com/a/68746273
      require.config({
        // 0.53 introduced an ugly middle line through blocks
        paths: { vs: 'https://unpkg.com/monaco-editor@0.52.2/min/vs' }
      })
      require(['vs/editor/editor.main'], () => {
        const isDark = matchMedia('(prefers-color-scheme: dark)')

        // https://microsoft.github.io/monaco-editor/playground.html#creating-the-diffeditor-multi-line-example
        const original = monaco.editor.createModel(
          'Four legs good, two legs bad\n',
          'text/plain'
        )
        const modified = monaco.editor.createModel(
          'Four legs good, two legs better\n',
          'text/plain'
        )
        const diffEditor = monaco.editor.createDiffEditor(
          document.getElementById('container'),
          {
            theme: isDark.matches ? 'vs-dark' : 'vs',
            // https://microsoft.github.io/monaco-editor/api/interfaces/monaco.editor.IStandaloneDiffEditorConstructionOptions.html#originalEditable
            originalEditable: true,
            // https://stackoverflow.com/a/47163918
            automaticLayout: true,
            padding: { top: 10, bottom: 10 }
          }
        )
        diffEditor.setModel({ original, modified })
        isDark.addEventListener('change', e => {
          monaco.editor.setTheme(e.matches ? 'vs-dark' : 'vs')
        })
      })
    </script>
  </body>
</html>
